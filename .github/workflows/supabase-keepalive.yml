name: Supabase keep-alive

# Supabase pauses free-tier projects after 7 days without API traffic.
# This makes one lightweight database query per day so the project never idles.
on:
  schedule:
    - cron: "17 8 * * *" # daily at 08:17 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query the database
        run: |
          curl --fail --silent --show-error \
            "${{ secrets.SUPABASE_URL }}/rest/v1/events?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null
